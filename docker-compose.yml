# LuxStay Direct — local stack (MySQL 8 + optional app)
# Run: docker compose up -d db
# Then: cp .env.example .env && npm run db:migrate && npm run db:seed && npm run dev

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: luxstay_root
      MYSQL_DATABASE: luxstay
      MYSQL_USER: luxstay
      MYSQL_PASSWORD: luxstay
    ports:
      # If bind fails (e.g. local MySQL already on 3306), use "3307:3306" and update DATABASE_URL port.
      - "3306:3306"
    volumes:
      - luxstay_mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pluxstay_root"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  app:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://luxstay:luxstay@db:3306/luxstay
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  luxstay_mysql:
