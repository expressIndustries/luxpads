# LuxPads — MySQL + Next.js app (Docker)
#
# From this folder:
#   docker compose up --build -d
# Then open http://localhost:3000
# phpMyAdmin: http://localhost:18080 (host port avoids common 8080 conflicts)
#   • With `db` service: log in with user `luxpads` / `luxpads` (or root / `luxpads_root`); server is pre-filled as `db`.
#   • If MySQL already runs on the host (e.g. port 23306), set in .env: PMA_HOST=host.docker.internal  PMA_PORT=23306
#     then: docker compose up -d phpmyadmin   (UI: http://localhost:18080)
#
# First-time demo data (optional):
#   docker compose exec app npx prisma db seed
# (Requires tsx; if that fails, run seed from your host against port 23306 — see README.)
#
# ── Fast local development (hot reload, no image rebuild) ───────────────────
# Option A — on your Mac (simplest): keep `db` running, stop production app, then:
#   docker compose stop app
#   npm ci && npx prisma generate && npm run dev
#   Use DATABASE_URL=mysql://luxpads:luxpads@127.0.0.1:23306/luxpads in .env
#
# Option B — dev server in Docker (same DB service):
#   docker compose stop app
#   docker compose --profile dev up app-dev
#   Open http://localhost:3000  (Ctrl+C to stop; `docker compose --profile dev down` optional)
# After package.json / lockfile changes inside app-dev: docker compose run --rm app-dev npm ci

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: luxpads_root
      MYSQL_DATABASE: luxpads
      MYSQL_USER: luxpads
      MYSQL_PASSWORD: luxpads
    ports:
      - "23306:3306"
    volumes:
      - luxpads_mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pluxpads_root"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AWS_BUCKET: ${AWS_BUCKET:-}
        AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
        AWS_REGION: ${AWS_REGION:-}
        AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
        NEXT_IMAGE_S3_HOSTS: ${NEXT_IMAGE_S3_HOSTS:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Inside Docker, MySQL is the `db` service — not localhost:23306 (that URL is for host-only tools).
      # Override with DOCKER_DATABASE_URL in .env if the app must use another server from the container.
      DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://luxpads:luxpads@db:3306/luxpads}
      AUTH_SECRET: ${AUTH_SECRET:-docker-dev-change-me-use-openssl-rand-base64-32}
      # Canonical public URL — avoids Auth.js redirecting sign-out to http://localhost:3000 when Host inside the container is wrong
      AUTH_URL: ${AUTH_URL:-${NEXT_PUBLIC_APP_URL:-http://localhost:3000}}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-LuxPads}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      # Maps (listing Location) — read at runtime; set in .env next to compose (no rebuild). NEXT_PUBLIC_* alone is empty if image was built without them.
      MAP_PROVIDER: ${MAP_PROVIDER:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      NODE_ENV: production
      REQUIRE_LISTING_APPROVAL: ${REQUIRE_LISTING_APPROVAL:-true}
      # S3 listing images (optional — same vars as .env; keys are runtime-only, not build args).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      AWS_S3_LISTING_PREFIX: ${AWS_S3_LISTING_PREFIX:-listing-images}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      NEXT_IMAGE_S3_HOSTS: ${NEXT_IMAGE_S3_HOSTS:-}
      # Optional: set to same path if you mount a volume (see volumes below).
      # LUXPADS_UPLOADS_ROOT: /data/luxpads-uploads
    volumes:
      # Persist listing photos across container rebuilds (and share if you scale replicas).
      - luxpads_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # Next.js dev server + bind mount — use instead of `app` while iterating on UI/API.
  # Does not run `next build`; changes reload in seconds. Profile keeps it off by default.
  app-dev:
    profiles: [dev]
    image: node:22-alpine
    working_dir: /app
    ports:
      - "${DEV_APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-mysql://luxpads:luxpads@db:3306/luxpads}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_SECRET: ${AUTH_SECRET:-docker-dev-change-me-use-openssl-rand-base64-32}
      AUTH_URL: ${AUTH_URL:-${NEXT_PUBLIC_APP_URL:-http://localhost:3000}}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-LuxPads}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      MAP_PROVIDER: ${MAP_PROVIDER:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      REQUIRE_LISTING_APPROVAL: ${REQUIRE_LISTING_APPROVAL:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      AWS_S3_LISTING_PREFIX: ${AWS_S3_LISTING_PREFIX:-listing-images}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      NEXT_IMAGE_S3_HOSTS: ${NEXT_IMAGE_S3_HOSTS:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_WEBHOOK_SIGNING_KEY: ${MAILGUN_WEBHOOK_SIGNING_KEY:-}
      MAILGUN_EU: ${MAILGUN_EU:-}
    volumes:
      - .:/app
      - luxpads_dev_node_modules:/app/node_modules
      - luxpads_uploads:/app/public/uploads
    command: ["sh", "/app/scripts/docker-dev-entry.sh"]
    depends_on:
      db:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-18080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PMA_HOST: ${PMA_HOST:-db}
      PMA_PORT: ${PMA_PORT:-3306}
    # No depends_on: db — allows `docker compose up -d phpmyadmin` when MySQL runs on the host (set PMA_HOST/PMA_PORT in .env).

volumes:
  luxpads_mysql:
  luxpads_uploads:
  luxpads_dev_node_modules:
