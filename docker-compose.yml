# LuxPads — MySQL + Next.js app (Docker)
#
# From this folder:
#   docker compose up --build -d
# Then open http://localhost:3000
#
# First-time demo data (optional):
#   docker compose exec app npx prisma db seed
# (Requires tsx; if that fails, run seed from your host against port 23306 — see README.)

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: luxpads_root
      MYSQL_DATABASE: luxpads
      MYSQL_USER: luxpads
      MYSQL_PASSWORD: luxpads
    ports:
      - "23306:3306"
    volumes:
      - luxpads_mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pluxpads_root"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Override in .env when using a host-managed or external MySQL instead of the db service.
      DATABASE_URL: ${DATABASE_URL:-mysql://luxpads:luxpads@db:3306/luxpads}
      AUTH_SECRET: ${AUTH_SECRET:-docker-dev-change-me-use-openssl-rand-base64-32}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-LuxPads}
      NODE_ENV: production
      REQUIRE_LISTING_APPROVAL: ${REQUIRE_LISTING_APPROVAL:-true}
    depends_on:
      db:
        condition: service_healthy

volumes:
  luxpads_mysql:
